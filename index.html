<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 뽑기 돌림판</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #222;
      margin-bottom: 16px;
    }
    .wheel-area {
      position: relative;
      width: min(96vw, 96vh, 660px);
      aspect-ratio: 1;
    }
    .arrow {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid #e53935;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.35));
      z-index: 10;
      pointer-events: none;
    }
    canvas {
      width: 100%; height: 100%;
      display: block;
      cursor: pointer;
      border-radius: 50%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    #result-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      padding: 24px 40px;
      border-radius: 20px;
      text-align: center;
      word-break: keep-all;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
      z-index: 20;
      max-width: 85%;
      cursor: pointer;
      pointer-events: none;
    }
    #result-overlay.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }
    #result-overlay .hint {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>🎡 학생 뽑기 돌림판</h1>
  <div class="wheel-area" id="wheelArea">
    <div class="arrow"></div>
    <canvas id="wheel"></canvas>
    <div id="result-overlay"></div>
  </div>

  <script>
    const items = [
      "Haribo (1)", "Mychew (2)", "Snickers (1)", "Mentos (1)", "Homework Pass",
      "Haribo (2)", "CU coupon(3000)", "Haribo (1)", "Mychew (2)", "Snickers (2)",
      "Mentos (2)", "Homework Pass", "Seat Change Pass", "Haribo (1)", "Mychew (2)",
      "Snickers (1)", "Snickers (2)", "Homework Pass", "Seat Change Pass", "Haribo (2)",
      "Mychew (4)", "Snickers (2)", "Mentos (1)", "Homework Pass", "Haribo (2)"
    ];

    const cuIndex = 6;
    const cuProb = 1 / 100;
    const otherProb = (1 - cuProb) / (items.length - 1);
    const weights = items.map((_, i) => i === cuIndex ? cuProb : otherProb);

    const palette = [
      "#B5D4F4","#9FE1CB","#F5C4B3","#F4C0D1","#C0DD97",
      "#CECBF6","#FFD700","#E1F5EE","#AFA9EC","#F0997B",
      "#5DCAA7","#85B7EB","#ED93B1","#97C459","#D3D1C7",
      "#EAF3DE","#FAECE7","#EEEDFE","#FAEEDA","#E6F1FB",
      "#9FE1CB","#F5C4B3","#CECBF6","#C0DD97","#FAC775"
    ];

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const n = items.length;
    const arc = (2 * Math.PI) / n;
    let currentAngle = 0;
    let spinning = false;
    let SIZE = 660;

    function resize() {
      const area = document.getElementById('wheelArea');
      SIZE = area.offsetWidth;
      canvas.width = SIZE;
      canvas.height = SIZE;
      drawWheel(currentAngle);
    }
    window.addEventListener('resize', resize);

    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTick() {
      const ac = getAudio();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle';
      o.frequency.value = 600 + Math.random() * 200;
      g.gain.setValueAtTime(0.18, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.04);
      o.start(ac.currentTime);
      o.stop(ac.currentTime + 0.04);
    }

    function playChord(ac, freqs, startTime, duration, gainVal, type) {
      freqs.forEach(freq => {
        const o = ac.createOscillator();
        const g = ac.createGain();
        const compress = ac.createDynamicsCompressor();
        o.connect(g); g.connect(compress); compress.connect(ac.destination);
        o.type = type;
        o.frequency.value = freq;
        g.gain.setValueAtTime(0, startTime);
        g.gain.linearRampToValueAtTime(gainVal, startTime + 0.03);
        g.gain.setValueAtTime(gainVal, startTime + duration - 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        o.start(startTime);
        o.stop(startTime + duration);
      });
    }

    function playFanfare(isCU) {
      const ac = getAudio();
      if (!isCU) {
        const seq = [
          { freqs: [523,659,784],  t:0.00, dur:0.18 },
          { freqs: [587,740,880],  t:0.18, dur:0.18 },
          { freqs: [659,784,987],  t:0.36, dur:0.18 },
          { freqs: [698,880,1047], t:0.54, dur:0.40 },
        ];
        seq.forEach(({ freqs, t, dur }) => {
          playChord(ac, freqs, ac.currentTime+t, dur, 0.12, 'sine');
          playChord(ac, freqs, ac.currentTime+t, dur, 0.06, 'triangle');
          playChord(ac, freqs.map(f=>f/2), ac.currentTime+t, dur, 0.08, 'sine');
        });
      } else {
        const seq = [
          { freqs: [392,523,659,784],   t:0.00, dur:0.20 },
          { freqs: [440,554,698,880],   t:0.20, dur:0.20 },
          { freqs: [494,622,740,988],   t:0.40, dur:0.20 },
          { freqs: [523,659,784,1047],  t:0.60, dur:0.20 },
          { freqs: [587,740,880,1175],  t:0.80, dur:0.20 },
          { freqs: [659,784,988,1319],  t:1.00, dur:0.20 },
          { freqs: [784,988,1175,1568], t:1.20, dur:0.70 },
        ];
        seq.forEach(({ freqs, t, dur }) => {
          playChord(ac, freqs, ac.currentTime+t, dur, 0.10, 'sine');
          playChord(ac, freqs, ac.currentTime+t, dur, 0.05, 'square');
          playChord(ac, freqs, ac.currentTime+t, dur, 0.05, 'triangle');
          playChord(ac, freqs.map(f=>f/2), ac.currentTime+t, dur, 0.08, 'sine');
        });
        const buf = ac.createBuffer(1, ac.sampleRate*0.5, ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let i=0; i<data.length; i++) data[i]=(Math.random()*2-1)*(1-i/data.length);
        const src = ac.createBufferSource();
        const g = ac.createGain();
        const filter = ac.createBiquadFilter();
        filter.type='highpass'; filter.frequency.value=4000;
        src.buffer=buf; src.connect(filter); filter.connect(g); g.connect(ac.destination);
        g.gain.setValueAtTime(0.15, ac.currentTime+1.2);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+1.7);
        src.start(ac.currentTime+1.2);
      }
    }

    function drawWheel(angle) {
      const cx = SIZE/2, cy = SIZE/2, r = SIZE/2 - 4;
      ctx.clearRect(0, 0, SIZE, SIZE);
      for (let i=0; i<n; i++) {
        const start = angle + i*arc;
        const end = start + arc;
        const mid = start + arc/2;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[i];
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        const innerR = r * 0.38;
        const availableLen = r - innerR - r*0.05;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(mid);

        const label = items[i];
        let fontSize = Math.round(r*0.075);
        ctx.font = `bold ${fontSize}px sans-serif`;
        let textWidth = ctx.measureText(label).width;
        while (textWidth > availableLen && fontSize > 9) {
          fontSize -= 0.5;
          ctx.font = `bold ${fontSize}px sans-serif`;
          textWidth = ctx.measureText(label).width;
        }
        ctx.fillStyle = '#222';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, innerR, 0);
        ctx.restore();
      }

      const cr = r * 0.22;
      ctx.beginPath();
      ctx.arc(cx, cy, cr, 0, 2*Math.PI);
      ctx.fillStyle = spinning ? '#555' : '#e53935';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.font = `bold ${Math.round(cr*0.42)}px sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(spinning ? '...' : '돌리기!', cx, cy);
    }

    function getCurrentSlice(angle) {
      const norm = ((angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const pointer = 3*Math.PI/2;
      const adjusted = ((pointer-norm)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      return Math.floor(adjusted/arc)%n;
    }

    function pickItem() {
      const rand = Math.random();
      let cumulative = 0;
      for (let i=0; i<weights.length; i++) {
        cumulative += weights[i];
        if (rand < cumulative) return i;
      }
      return weights.length-1;
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      const overlay = document.getElementById('result-overlay');
      overlay.classList.remove('show');
      overlay.innerHTML = '';

      const winnerIdx = pickItem();
      const targetSliceAngle = winnerIdx*arc + arc/2;
      const pointerAngle = 3*Math.PI/2;
      const normalizedCurrent = ((currentAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      let targetAngle = pointerAngle - targetSliceAngle;
      targetAngle = ((targetAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const extraRotations = 2*Math.PI*(8+Math.floor(Math.random()*5));
      const totalRot = extraRotations + targetAngle - normalizedCurrent + (targetAngle < normalizedCurrent ? 2*Math.PI : 0);

      const duration = 4000 + Math.random()*1500;
      const start = performance.now();
      const startAngle = currentAngle;
      let lastSlice = getCurrentSlice(currentAngle);

      function easeOut(t) { return 1-Math.pow(1-t,4); }

      function animate(now) {
        const elapsed = now - start;
        const t = Math.min(elapsed/duration, 1);
        currentAngle = startAngle + totalRot*easeOut(t);
        drawWheel(currentAngle);
        const curSlice = getCurrentSlice(currentAngle);
        if (curSlice !== lastSlice) { playTick(); lastSlice = curSlice; }
        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          spinning = false;
          drawWheel(currentAngle);
          const isCU = winnerIdx === cuIndex;
          overlay.innerHTML = (isCU ? '🎊✨ ' : '🎉 ') + items[winnerIdx] + '!<span class="hint">클릭하면 닫힘</span>';
          setTimeout(() => overlay.classList.add('show'), 50);
          playFanfare(isCU);
        }
      }
      requestAnimationFrame(animate);
    }

    canvas.addEventListener('click', (e) => {
      const overlay = document.getElementById('result-overlay');
      if (overlay.classList.contains('show')) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = SIZE / rect.width;
      const scaleY = SIZE / rect.height;
      const x = (e.clientX - rect.left) * scaleX - SIZE/2;
      const y = (e.clientY - rect.top) * scaleY - SIZE/2;
      const dist = Math.sqrt(x*x + y*y);
      const cr = (SIZE/2 - 4) * 0.22;
      if (dist <= cr) spin();
    });

    document.getElementById('result-overlay').addEventListener('click', () => {
      document.getElementById('result-overlay').classList.remove('show');
    });

    setTimeout(resize, 50);
  </script>
</body>
</html>
